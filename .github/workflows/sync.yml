name: WheelPros SFTP → FTP Sync

on:
  # ── Scheduled runs ─────────────────────────────────────────────
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours

  # ── Manual trigger from GitHub UI ──────────────────────────────
  workflow_dispatch:

jobs:
  sync:
    name: Sync Inventory Feed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync (single pass)
        env:
          # ── SFTP Source (sftp.wheelpros.com) ──────────────────
          SFTP_HOST:        ${{ secrets.SFTP_HOST }}
          SFTP_PORT:        22
          SFTP_USER:        ${{ secrets.SFTP_USER }}
          SFTP_PASS:        ${{ secrets.SFTP_PASS }}
          SFTP_TIRES_PATH:  ${{ secrets.SFTP_TIRES_PATH }}
          SFTP_WHEELS_PATH: ${{ secrets.SFTP_WHEELS_PATH }}

          # ── FTP Destination (ftp.wheelsbelowretail.com) ───────
          FTP_HOST:         ${{ secrets.FTP_HOST }}
          FTP_PORT:         21
          FTP_USER:         ${{ secrets.FTP_USER }}
          FTP_PASS:         ${{ secrets.FTP_PASS }}
          FTP_TIRES_DIR:    ${{ secrets.FTP_TIRES_DIR }}
          FTP_WHEELS_DIR:   ${{ secrets.FTP_WHEELS_DIR }}

        run: node sync.js --once

      - name: Upload sync log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_number }}
          path: sync.log
          retention-days: 7
